<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherWise</title>
  <script src="weather.js" defer></script>
  <link rel="shortcut icon" href="weather_logo.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
 <style>
    :root {
      --bg-from: #0f0c29;
      --bg-mid:  #302b63;
      --bg-to:   #24243e;
      --card:    rgba(255,255,255,0.07);
      --card-border: rgba(255,255,255,0.13);
      --accent:  #a78bfa;
      --accent2: #60a5fa;
      --text:    #f1f5f9;
      --muted:   rgba(255,255,255,0.45);
      --pill:    rgba(255,255,255,0.08);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, var(--bg-from), var(--bg-mid), var(--bg-to));
      background-size: 300% 300%;
      animation: bgShift 12s ease infinite;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
      overflow-x: hidden;
    }

    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(90px);
      opacity: 0.15;
    }
    .orb-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #a78bfa, transparent 70%);
      top: -180px; left: -180px;
      animation: float1 11s ease-in-out infinite;
    }
    .orb-2 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, #60a5fa, transparent 70%);
      bottom: -120px; right: -120px;
      animation: float2 14s ease-in-out infinite;
    }
    @keyframes float1 {
      0%,100% { transform: translate(0,0); }
      50% { transform: translate(50px, 50px); }
    }
    @keyframes float2 {
      0%,100% { transform: translate(0,0); }
      50% { transform: translate(-40px,-40px); }
    }

    /* ─── HEADER ─── */
    .header {
      position: relative; z-index: 1;
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.7s ease both;
    }
    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-22px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .brand {
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, #e0c3fc 0%, #a78bfa 50%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 3.5px;
      text-transform: uppercase;
      margin-top: 6px;
      font-weight: 400;
    }

    /* ─── SEARCH ─── */
    .search-wrap {
      position: relative; z-index: 1;
      display: flex;
      gap: 10px;
      margin-bottom: 36px;
      animation: fadeDown 0.7s 0.15s ease both;
    }
    #search {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid var(--card-border);
      border-radius: 50px;
      padding: 14px 26px;
      font-size: 1rem;
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      outline: none;
      width: clamp(200px, 55vw, 300px);
      backdrop-filter: blur(14px);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.2);
    }
    #searchBtn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50px;
      padding: 14px 28px;
      font-size: 1rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 22px rgba(167,139,250,0.38);
      letter-spacing: 0.3px;
    }
    #searchBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(167,139,250,0.55);
    }
    #searchBtn:active { transform: scale(0.96); }

    /* ─── CARD ─── */
    .card {
      position: relative; z-index: 1;
      background: var(--card);
      border: 1.5px solid var(--card-border);
      border-radius: 36px;
      padding: 38px 42px;
      width: min(490px, 94vw);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 28px 72px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.12);
      animation: fadeUp 0.7s 0.3s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(32px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* Location */
    .location-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .pin-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(167,139,250,0.35);
    }
    #location_val {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.4px;
    }

    /* Weather icon */
    .icon-wrap {
      text-align: center;
      margin: 22px 0 8px;
    }
    #weather_icon {
      font-size: 80px;
      display: inline-block;
      animation: floatIcon 4s ease-in-out infinite;
      filter: drop-shadow(0 10px 28px rgba(167,139,250,0.45));
    }
    @keyframes floatIcon {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    /* Temp */
    .temp-row {
      text-align: center;
      line-height: 1;
      margin-bottom: 6px;
    }
    #temp_val {
      font-family: 'Space Mono', monospace;
      font-size: clamp(4.5rem, 14vw, 7rem);
      font-weight: 700;
      background: linear-gradient(160deg, #ffffff 20%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .deg {
      font-family: 'Space Mono', monospace;
      font-size: 2.4rem;
      font-weight: 400;
      background: linear-gradient(160deg, #ffffff 20%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      vertical-align: super;
    }

    #feels_like {
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 30px;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      margin-bottom: 26px;
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .stat-box {
      background: var(--pill);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      padding: 18px 8px 14px;
      text-align: center;
      transition: transform 0.25s, background 0.25s, box-shadow 0.25s;
      cursor: default;
    }
    .stat-box:hover {
      transform: translateY(-5px);
      background: rgba(167,139,250,0.13);
      box-shadow: 0 8px 24px rgba(167,139,250,0.2);
    }
    .stat-icon { font-size: 1.6rem; display: block; margin-bottom: 8px; }
    .stat-label {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .stat-val {
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    /* Error */
    #error_msg {
      display: none;
      text-align: center;
      color: #f87171;
      font-size: 0.88rem;
      margin-top: 14px;
      padding: 10px 16px;
      background: rgba(248,113,113,0.1);
      border-radius: 12px;
      border: 1px solid rgba(248,113,113,0.25);
    }

    /* ─── FOOTER ─── */
    .footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      text-align: center;
      padding: 11px 16px;
      font-size: 0.75rem;
      background: rgba(10, 8, 30, 0.7);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,255,255,0.07);
      color: var(--muted);
      letter-spacing: 0.4px;
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .footer a:hover { color: #fff; }
    .sep { margin: 0 8px; opacity: 0.35; }

    /* Responsive */
    @media (max-width: 480px) {
      .card { padding: 28px 22px; }
      .stat-box { padding: 14px 6px 12px; }
      .stat-val { font-size: 0.82rem; }
      #search { width: 190px; }
    }
  </style>*/
 
</head>

<body>
  <!-- Glow Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Header -->
  <header class="header">
    <div class="brand">⛅ WeatherWise</div>
    <div class="tagline">Real-time forecasts · Worldwide</div>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <input type="search" id="search" placeholder="Search city..." value="Ganganagar" autocomplete="off">
    <button id="searchBtn" onclick="weather()">Search</button>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="location-row">
      <div class="pin-icon">📍</div>
      <span id="location_val">Loading...</span>
    </div>

    <div class="icon-wrap">
      <span id="weather_icon">🌤️</span>
    </div>

    <div class="temp-row">
      <span id="temp_val">--</span><span class="deg">°C</span>
    </div>

    <p id="feels_like">Feels like --°C</p>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat-box">
        <span class="stat-icon">💧</span>
        <span class="stat-label">Humidity</span>
        <span class="stat-val" id="hum_val">--%</span>
      </div>
      <div class="stat-box">
        <span class="stat-icon">🌬️</span>
        <span class="stat-label">Wind</span>
        <span class="stat-val" id="wind_val">--</span>
      </div>
      <div class="stat-box">
        <span class="stat-icon">🔵</span>
        <span class="stat-label">Pressure</span>
        <span class="stat-val" id="pre_val">--</span>
      </div>
    </div>

    <div id="error_msg">⚠️ City not found. Please try again.</div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    &copy; 2025 Designed &amp; Developed by
    <a href="https://github.com/CodeBreaker-0111" target="_blank" rel="noopener">Aaditya Bansal</a>
    <span class="sep">|</span> All Rights Reserved
    <span class="sep">|</span>
    <a href="https://github.com/CodeBreaker-0111/WeatherWise/blob/main/LICENSE" target="_blank" rel="noopener">MIT License</a>
  </footer>

</body>
</html>
