<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherWise</title>
  <script src="weather.js" defer></script>
  <link rel="shortcut icon" href="weather_logo.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

 
</head>

<body>
  <!-- Glow Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Header -->
  <header class="header">
    <div class="brand">⛅ WeatherWise</div>
    <div class="tagline">Real-time forecasts · Worldwide</div>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <input type="search" id="search" placeholder="Search city..." value="Ganganagar" autocomplete="off">
    <button id="searchBtn" onclick="weather()">Search</button>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="location-row">
      <div class="pin-icon">📍</div>
      <span id="location_val">Loading...</span>
    </div>

    <div class="icon-wrap">
      <span id="weather_icon">🌤️</span>
    </div>

    <div class="temp-row">
      <span id="temp_val">--</span><span class="deg">°C</span>
    </div>

    <p id="feels_like">Feels like --°C</p>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat-box">
        <span class="stat-icon">💧</span>
        <span class="stat-label">Humidity</span>
        <span class="stat-val" id="hum_val">--%</span>
      </div>
      <div class="stat-box">
        <span class="stat-icon">🌬️</span>
        <span class="stat-label">Wind</span>
        <span class="stat-val" id="wind_val">--</span>
      </div>
      <div class="stat-box">
        <span class="stat-icon">🔵</span>
        <span class="stat-label">Pressure</span>
        <span class="stat-val" id="pre_val">--</span>
      </div>
    </div>

    <div id="error_msg">⚠️ City not found. Please try again.</div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    &copy; 2025 Designed &amp; Developed by
    <a href="https://github.com/CodeBreaker-0111" target="_blank" rel="noopener">Aaditya Bansal</a>
    <span class="sep">|</span> All Rights Reserved
    <span class="sep">|</span>
    <a href="https://github.com/CodeBreaker-0111/WeatherWise/blob/main/LICENSE" target="_blank" rel="noopener">MIT License</a>
  </footer>

</body>
</html>
